name: Android Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    # 授予写入 Release 的权限
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: Decode release keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks

      - name: Cleanup All Problematic SDKs
        run: |
          rm -rf $ANDROID_HOME/platforms/android-*-ext*
          rm -rf $ANDROID_HOME/platforms/android-34*
          rm -rf $ANDROID_HOME/platforms/android-35*
          rm -rf $ANDROID_HOME/platforms/android-36*
          rm -rf $ANDROID_HOME/platforms/android-37*
          
          echo "SDK cleanup complete. Current platforms:"
          ls $ANDROID_HOME/platforms

      - name: Build signed release APK
        run: |
          chmod +x gradlew
          APK_VERSION="${GITHUB_REF_NAME:-nightly}"
          ./gradlew :app:assembleRelease \
            -PAPK_VERSION="$APK_VERSION" \
            -PRELEASE_STORE_FILE=$GITHUB_WORKSPACE/release.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Generate SHA256 for APK
        run: |
          set -e
          shopt -s nullglob
          for apk in app/build/outputs/apk/release/*.apk; do
            sha_file="${apk%.apk}.sha256"
            sha256sum "$apk" | awk '{print $1}' > "$sha_file"
            echo "Generated $sha_file"
          done

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvboxnew-apk
          path: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/release/*.sha256
